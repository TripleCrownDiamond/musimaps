<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="theme-color" content="#00FCFC" />
    <script>
      // Applique le theme avant le premier rendu pour eviter le flash.
      (function () {
        try {
          var saved = localStorage.getItem('musimaps.theme')
          var dark = saved ? saved === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MusiMaps | L'Atlas Vivant de la Musique</title>
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800&f[]=satoshi@400,500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
